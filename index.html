<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FLT BTTR FFZ – Materialbestellung</title>

<style>
:root{
  --bg:#f0f2f5;
  --card:#ffffff;
  --dark:#1f2a2c;
  --green:#2f4f39;
  --light:#d7dbe0;
  --border:#d0d4da;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
}

.app{
  max-width:900px;
  margin:auto;
  padding:10px;
}

h1{
  background:var(--dark);
  color:white;
  padding:18px;
  border-radius:6px;
  font-size:2rem;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.version{
  font-size:0.9rem;
  opacity:0.8;
}

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:6px;
  padding:25px;
}

.step-indicator{
  display:flex;
  gap:5px;
  margin-bottom:15px;
}

.step-dot{
  height:6px;
  flex:1;
  background:#cfd4d9;
  border-radius:999px;
}

.step-dot.active{
  background:var(--green);
}

label{
  display:block;
  margin-top:14px;
  margin-bottom:4px;
  font-size:0.85rem;
  font-weight:600;
}

input, select, textarea{
  width:100%;
  padding:10px;
  border:1px solid #c7ccd1;
  border-radius:4px;
  box-sizing:border-box;
  font-size:1rem;
}

textarea{
  resize:vertical;
}

button{
  border:none;
  padding:14px;
  border-radius:999px;
  cursor:pointer;
  font-size:1rem;
  flex:1;
}

.primary{
  background:var(--green);
  color:white;
}

.secondary{
  background:var(--light);
}

.button-row{
  display:flex;
  gap:12px;
  margin-top:20px;
}

.category{
  border-top:1px solid #e2e5ea;
  margin-top:14px;
  padding-top:14px;
}

.category-header{
  cursor:pointer;
  font-weight:700;
  text-transform:uppercase;
}

.subs{
  display:none;
  margin-top:10px;
}

.subs.open{
  display:block;
}

.qty-row{
  display:grid;
  grid-template-columns:1fr 100px;
  gap:10px;
  margin-bottom:6px;
  align-items:center;
}

.error{
  color:#b30000;
  margin-top:10px;
}

.success{
  color:#006400;
  margin-top:10px;
}

.summary ul{
  margin-top:4px;
}

@media(max-width:600px){
  h1{
    font-size:1.4rem;
    flex-direction:column;
    align-items:flex-start;
  }

  .qty-row{
    grid-template-columns:1fr 70px;
  }
}
</style>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
/* =========================
   EMAILJS DATEN
========================= */

const EMAILJS_PUBLIC_KEY = "ea8CHyfL3ZcO48AfE";
const EMAILJS_SERVICE_ID = "service_qwz9qbt";
const EMAILJS_TEMPLATE_ID = "template_i6hs68v";

emailjs.init({
  publicKey: EMAILJS_PUBLIC_KEY
});

/* =========================
   PASSWORT
========================= */

const PASSWORD = "Material2_2026!";

/* =========================
   STATE
========================= */

const state = {
  language:"",
  besteller:"",
  zug:"",
  bestelldatum:"",
  abholung:"",
  rueckgabe:"",
  items:[]
};

/* =========================
   KATEGORIEN
========================= */

const categories = [
{
  key:"san",
  label:"Sanitätsdienst",
  subs:[
    "Sanitätsbahre",
    "Verbandsmaterial",
    "Wolldecke"
  ]
},
{
  key:"funk",
  label:"Funk",
  subs:[
    "SE-235",
    "SE-135",
    "Adressnetzplan"
  ]
},
{
  key:"allg",
  label:"Allgemein",
  subs:[
    "Kabelbinder",
    "Schaufel",
    "Pickel",
    "Tarnnetz"
  ]
}
];

/* =========================
   HELPERS
========================= */

function pad(n){
  return n < 10 ? "0"+n : n;
}

function toInputDate(d){
  return d.getFullYear() + "-" +
  pad(d.getMonth()+1) + "-" +
  pad(d.getDate()) + "T" +
  pad(d.getHours()) + ":" +
  pad(d.getMinutes());
}

function formatDate(d){
  return new Date(d).toLocaleString("de-CH");
}

function escapeHtml(str){
  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* =========================
   LOGIN
========================= */

function handleLogin(){

  const pw = document.getElementById("pwInput").value;

  if(pw === PASSWORD){
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("appCard").style.display = "block";

    initDates();
  } else {
    document.getElementById("loginError").textContent = "Passwort falsch.";
  }
}

/* =========================
   INIT DATES
========================= */

function initDates(){

  const now = new Date();

  bestelldatum.value = toInputDate(now);

  const pickup = new Date(now.getTime() + 26*60*60*1000);
  const ret = new Date(now.getTime() + 50*60*60*1000);

  abholung.value = toInputDate(pickup);
  rueckgabe.value = toInputDate(ret);
}

/* =========================
   STEPS
========================= */

function goToStep(step){

  step1.style.display = "none";
  step2.style.display = "none";
  step3.style.display = "none";

  document.getElementById("step"+step).style.display = "block";

  document.querySelectorAll(".step-dot").forEach((e,i)=>{
    if(i < step){
      e.classList.add("active");
    } else {
      e.classList.remove("active");
    }
  });
}

/* =========================
   STEP 1
========================= */

function nextStep1(){

  const error = document.getElementById("step1Error");
  error.textContent = "";

  if(
    !language.value ||
    !besteller.value ||
    !zug.value ||
    !abholung.value ||
    !rueckgabe.value
  ){
    error.textContent = "Bitte alle Felder ausfüllen.";
    return;
  }

  state.language = language.value;
  state.besteller = besteller.value;
  state.zug = zug.value;
  state.bestelldatum = bestelldatum.value;
  state.abholung = abholung.value;
  state.rueckgabe = rueckgabe.value;

  renderCategories();

  goToStep(2);
}

/* =========================
   RENDER KATEGORIEN
========================= */

function renderCategories(){

  categoriesContainer.innerHTML = "";

  categories.forEach(cat=>{

    const div = document.createElement("div");

    div.className = "category";

    div.innerHTML = `
      <div class="category-header"
           onclick="toggleCat('${cat.key}')">
        ${cat.label}
      </div>

      <div class="subs"
           id="subs-${cat.key}">

        ${cat.subs.map(sub=>`
          <div class="qty-row">
            <div>${sub}</div>

            <input type="number"
                   min="0"
                   value="0"
                   id="${cat.key}-${sub}">
          </div>
        `).join("")}
      </div>
    `;

    categoriesContainer.appendChild(div);
  });
}

function toggleCat(key){

  document
    .getElementById("subs-"+key)
    .classList.toggle("open");
}

/* =========================
   STEP 2
========================= */

function nextStep2(){

  const selected = [];

  categories.forEach(cat=>{

    cat.subs.forEach(sub=>{

      const val = parseInt(
        document.getElementById(cat.key+"-"+sub).value
      );

      if(val > 0){

        selected.push({
          category:cat.label,
          sub,
          qty:val
        });
      }
    });
  });

  if(selected.length === 0){
    step2Error.textContent =
      "Bitte mindestens 1 Material auswählen.";
    return;
  }

  state.items = selected;

  buildSummary();

  goToStep(3);
}

/* =========================
   SUMMARY
========================= */

function buildSummary(){

  let html = `
    <p><strong>Besteller:</strong> ${escapeHtml(state.besteller)}</p>

    <p><strong>Zug:</strong> ${escapeHtml(state.zug)}</p>

    <p><strong>Sprache:</strong> ${escapeHtml(state.language)}</p>

    <p><strong>Bestelldatum:</strong> ${formatDate(state.bestelldatum)}</p>

    <p><strong>Abholung:</strong> ${formatDate(state.abholung)}</p>

    <p><strong>Rückgabe:</strong> ${formatDate(state.rueckgabe)}</p>

    <h3>Material</h3>

    <ul>
  `;

  state.items.forEach(item=>{

    html += `
      <li>
        <strong>${item.category}</strong><br>
        ${item.sub}: ${item.qty}
      </li>
    `;
  });

  html += "</ul>";

  summaryContent.innerHTML = html;
}

/* =========================
   EMAIL BODY
========================= */

function buildMailBody(){

  let body = "";

  body += "Besteller: " + state.besteller + "\n";
  body += "Zug: " + state.zug + "\n";
  body += "Sprache: " + state.language + "\n";
  body += "Bestelldatum: " + formatDate(state.bestelldatum) + "\n";
  body += "Abholung: " + formatDate(state.abholung) + "\n";
  body += "Rückgabe: " + formatDate(state.rueckgabe) + "\n\n";

  body += "MATERIAL\n";
  body += "====================\n";

  state.items.forEach(item=>{

    body += item.category + " - " +
            item.sub + ": " +
            item.qty + "\n";
  });

  return body;
}

/* =========================
   SENDEN
========================= */

function sendOrder(){

  sendInfo.className = "";
  sendInfo.textContent = "Bestellung wird versendet...";

  const subject =
    "Materialbestellung - " +
    state.zug +
    " - " +
    state.besteller;

  const body = buildMailBody();

  const templateParams = {

    to_email:"flt.ffz.bttr@gmail.com",

    subject:subject,

    message:body,

    besteller:state.besteller,

    zug:state.zug
  };

  emailjs.send(
    EMAILJS_SERVICE_ID,
    EMAILJS_TEMPLATE_ID,
    templateParams
  )
  .then(function(response){

    console.log("SUCCESS", response);

    sendInfo.className = "success";
    sendInfo.textContent =
      "Bestellung erfolgreich versendet.";

  })
  .catch(function(error){

    console.error("FAILED", error);

    sendInfo.className = "error";

    sendInfo.innerHTML =
      "Fehler beim Versenden.<br><br>" +
      "Prüfe bitte:<br>" +
      "• Service ID<br>" +
      "• Template ID<br>" +
      "• Public Key<br>" +
      "• ob dein EmailJS Template aktiviert ist";
  });
}
</script>
</head>

<body>

<div class="app">

<h1>
  FLT BTTR FFZ – MATERIALBESTELLUNG
  <span class="version">VERSION 1.3</span>
</h1>

<!-- LOGIN -->

<div id="loginCard" class="card">

  <h2>Anmeldung</h2>

  <label>Passwort</label>

  <input type="password"
         id="pwInput">

  <div class="button-row">

    <button class="primary"
            onclick="handleLogin()">
      Login
    </button>

  </div>

  <div class="error"
       id="loginError"></div>

</div>

<!-- APP -->

<div id="appCard"
     style="display:none;">

<div class="step-indicator">
  <div class="step-dot active"></div>
  <div class="step-dot"></div>
  <div class="step-dot"></div>
</div>

<!-- STEP 1 -->

<div id="step1" class="card">

<h2>1. Grunddaten</h2>

<label>Sprache</label>

<select id="language">
  <option value="">Bitte wählen</option>
  <option value="Deutsch">Deutsch</option>
  <option value="Français">Français</option>
  <option value="Italiano">Italiano</option>
</select>

<label>Besteller</label>

<input type="text"
       id="besteller">

<label>Zug</label>

<select id="zug">
  <option value="">Bitte wählen</option>
  <option>C1</option>
  <option>M113</option>
  <option>KDO</option>
  <option>UEM 1</option>
  <option>UEM 2</option>
  <option>WETTER</option>
  <option>BM</option>
</select>

<label>Bestelldatum</label>

<input type="datetime-local"
       id="bestelldatum"
       readonly>

<label>Abholung</label>

<input type="datetime-local"
       id="abholung">

<label>Rückgabe</label>

<input type="datetime-local"
       id="rueckgabe">

<div class="error"
     id="step1Error"></div>

<div class="button-row">

<button class="primary"
        onclick="nextStep1()">
  Weiter
</button>

</div>

</div>

<!-- STEP 2 -->

<div id="step2"
     class="card"
     style="display:none;">

<h2>2. Material</h2>

<div id="categoriesContainer"></div>

<div class="error"
     id="step2Error"></div>

<div class="button-row">

<button class="secondary"
        onclick="goToStep(1)">
  Zurück
</button>

<button class="primary"
        onclick="nextStep2()">
  Weiter
</button>

</div>

</div>

<!-- STEP 3 -->

<div id="step3"
     class="card"
     style="display:none;">

<h2>3. Zusammenfassung</h2>

<div class="summary"
     id="summaryContent"></div>

<div class="button-row">

<button class="secondary"
        onclick="goToStep(2)">
  Zurück
</button>

<button class="primary"
        onclick="sendOrder()">
  Senden
</button>

</div>

<div id="sendInfo"></div>

</div>

</div>

</div>

</body>
</html>
