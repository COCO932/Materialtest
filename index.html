<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materialbestellung</title>

  <style>
    :root{
      --bg-main:#f0f2f5;
      --bg-card:#ffffff;
      --border-card:#d0d4da;
      --accent-dark:#1f2a2c;
      --accent-main:#2f4f39;
      --accent-light:#d7dbe0;
      --text-main:#111111;
      --text-muted:#555555;
      --error:#b02020;
    }

    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      margin:0;
      background:var(--bg-main);
      color:var(--text-main);
    }

    .app{
      max-width:720px;
      margin:0 auto;
      padding:0 16px 32px;
    }

    h1{
      font-size:1.4rem;
      margin:0 -16px 12px;
      padding:12px 16px;
      background:var(--accent-dark);
      color:#fff;
      text-transform:uppercase;
      letter-spacing:.06em;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-sizing:border-box;
    }

    h1 .version{
      font-size:.75rem;
      font-weight:400;
      opacity:.85;
    }

    h2{
      font-size:1.05rem;
      margin:0 0 8px;
    }

    h3{
      font-size:.9rem;
      margin:12px 0 4px;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:var(--text-muted);
    }

    .card{
      background:var(--bg-card);
      border-radius:4px;
      padding:16px;
      border:1px solid var(--border-card);
      margin-top:12px;
    }

    label{
      display:block;
      font-size:.8rem;
      margin-bottom:3px;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:var(--text-muted);
    }

    input,select,textarea{
      width:100%;
      padding:7px 9px;
      border-radius:3px;
      border:1px solid #c0c4cc;
      font-size:.95rem;
      box-sizing:border-box;
      background:#fff;
    }

    textarea{
      resize:vertical;
    }

    .button-row{
      display:flex;
      gap:8px;
      margin-top:12px;
    }

    button{
      flex:1;
      padding:9px 14px;
      border-radius:999px;
      border:none;
      font-size:.95rem;
      cursor:pointer;
      font-weight:500;
    }

    button.primary{
      background:var(--accent-main);
      color:#fff;
    }

    button.secondary{
      background:var(--accent-light);
      color:#111;
    }

    .error{
      color:var(--error);
      font-size:.8rem;
      margin-top:4px;
      white-space:pre-wrap;
    }

    .step-indicator{
      display:flex;
      gap:4px;
      margin:4px 0 12px;
    }

    .step-dot{
      flex:1;
      height:4px;
      background:#c2c7cf;
      border-radius:999px;
    }

    .step-dot.active{
      background:var(--accent-main);
    }

    .category{
      border-top:1px solid #e0e3ea;
      padding-top:10px;
      margin-top:10px;
    }

    .category-header{
      display:flex;
      justify-content:space-between;
      cursor:pointer;
      align-items:center;
    }

    .category-title{
      font-weight:600;
      font-size:.9rem;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .subcategories{
      margin-top:6px;
      display:none;
    }

    .subcategories.open{
      display:block;
    }

    .qty-row{
      display:grid;
      grid-template-columns:3fr .9fr;
      gap:8px;
      margin-bottom:4px;
      align-items:center;
    }

    .qty-row span{
      font-size:.85rem;
    }

    .qty-row input[type="number"]{
      width:100%;
      text-align:right;
      padding-right:6px;
    }

    ul.summary{
      padding-left:18px;
      margin-top:4px;
    }

    ul.summary>li{
      margin-bottom:4px;
    }

    @media (max-width:480px){
      h1{
        font-size:1.2rem;
        flex-direction:column;
        align-items:flex-start;
        gap:2px;
      }

      h1 .version{
        align-self:flex-end;
      }

      .qty-row{
        grid-template-columns:2.3fr 1fr;
      }
    }
  </style>

  <!-- EMAILJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    const EMAILJS_SERVICE_ID  = "service_qwz9qbt";
    const EMAILJS_TEMPLATE_ID = "template_i6hs68v";
    const EMAILJS_PUBLIC_KEY  = "ea8CHyfL3ZcO48AfE";

    emailjs.init({
      publicKey: EMAILJS_PUBLIC_KEY
    });
  </script>
</head>

<body>

<div class="app">

<h1>
  Flt Bttr FFZ – Materialbestellung
  <span class="version">Version 1.3</span>
</h1>

<div class="step-indicator">
  <div class="step-dot active"></div>
  <div class="step-dot active"></div>
  <div class="step-dot active"></div>
</div>

<div class="card">

<h2>3. Zusammenfassung</h2>

<div id="summaryContent">

<p><strong>Besteller:</strong> Cataldo</p>
<p><strong>Zug:</strong> BM</p>
<p><strong>Sprache:</strong> Deutsch</p>
<p><strong>Bestelldatum:</strong> 18.5.2026, 19:22:40</p>
<p><strong>Abholung:</strong> 19.5.2026, 21:22:00</p>
<p><strong>Rückgabe:</strong> 20.5.2026, 21:22:00</p>

<h3>MATERIAL</h3>

<ul class="summary">
  <li>
    <strong>Sanitätsdienst</strong>
    <ul>
      <li>Sanitätsbahre: 1</li>
    </ul>
  </li>
</ul>

</div>

<div class="button-row">
  <button class="secondary">
    Zurück / Retour / Indietro
  </button>

  <button class="primary" onclick="sendOrder()">
    Senden / Envoyer / Inviare
  </button>
</div>

<div id="sendInfo" class="error"></div>

</div>

</div>

<script>

const state = {
  language:"de",
  besteller:"Cataldo",
  zug:"BM"
};

function buildMailBody(){

  return `
Besteller: Cataldo
Zug: BM
Sprache: Deutsch

Material:
- Sanitätsdienst
  • Sanitätsbahre: 1
`;
}

function t(key){

  const dict = {
    sending:"Bestellung wird versendet...",
    sentOk:"Bestellung wurde erfolgreich versendet.",
    sendFail:"Fehler beim Versenden."
  };

  return dict[key] || key;
}

const sendInfo = document.getElementById("sendInfo");

function sendOrder(){

  const subject =
    "Materialbestellung BM – Cataldo";

  const bodyText = buildMailBody();

  const templateParams = {

    to_email:"flt.ffz.bttr@gmail.com",

    subject:subject,

    message:bodyText,

    besteller:"Cataldo",

    zug:"BM",

    sprache_app:"Deutsch"
  };

  sendInfo.style.color = "#555";
  sendInfo.textContent = t("sending");

  emailjs.send(
    EMAILJS_SERVICE_ID,
    EMAILJS_TEMPLATE_ID,
    templateParams
  )

  .then(function(response){

    console.log("EMAIL SUCCESS:", response);

    sendInfo.style.color = "#060";

    sendInfo.textContent =
      t("sentOk");

  })

  .catch(function(error){

    console.error("EMAIL ERROR:", error);

    sendInfo.style.color = "#c00";

    sendInfo.textContent =
      t("sendFail") +
      "\n\nPrüfe dein EmailJS Template.";
  });
}

</script>

</body>
</html>
